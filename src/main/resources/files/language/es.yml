setup_messages:
  team:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> skywars team <count|size> <value></yellow>"
    success: "{prefix} <green>Equipo {setting} establecido en {value} para {game} en la arena {arena_id}.</green>"
    invalid_limit: "{prefix} <red>La configuración de equipos supera el máximo de jugadores de la arena ({max_players}).</red>"
    invalid_value: "{prefix} <red>Equipo {setting} debe ser mayor que 0.</red>"
    invalid_count: "{prefix} <red>El número de equipos debe ser al menos 2.</red>"
    numeric_ids_only: "{prefix} <red>El ID del equipo debe ser un número entre {min} y {max}.</red>"
  team_spawn:
    usage_add: "{prefix} <red>Uso:</red> <yellow>/baa game <id> skywars team spawn add</yellow>"
    usage_set: "{prefix} <red>Uso:</red> <yellow>/baa game <id> skywars team spawn set <team_id></yellow>"
    usage_remove: "{prefix} <red>Uso:</red> <yellow>/baa game <id> skywars team spawn remove <team_id></yellow>"
    teams_not_configured: "{prefix} <red>El número de equipos aún no está configurado. Defínelo primero con <yellow>/baa game <id> skywars team count <n></yellow>.</red>"
    added: "{prefix} <green>Aparición de equipo añadida para el hueco <white>{slot}/{count}</white> en tu ubicación actual.</green>"
    all_slots_filled: "{prefix} <red>Los {count} huecos de aparición de equipo ya están ocupados.</red>"
    set: "{prefix} <green>Aparición de equipo establecida para el equipo <white>{team}</white> en tu ubicación actual.</green>"
    removed: "{prefix} <yellow>Aparición de equipo eliminada para el equipo <white>{team}</white>.</yellow>"
  region:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> skywars region <set|clear></yellow>"
    must_use_stick: "{prefix} <red>Selecciona primero dos esquinas con la herramienta de setup.</red>"
    set: "{prefix} <green>Región de regeneración guardada.</green> <gray>Bloques:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
    cleared: "{prefix} <yellow>Región de regeneración borrada.</yellow>"
