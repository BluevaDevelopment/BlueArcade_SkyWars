# SkyWars Module Settings

file_version: 2

# Visual representation in menus
menus:
  vote:
    item: BOW

waiting_items:
  vote_settings:
    enabled: true
    material: NAME_TAG
    slot: 1
    display_name: "<aqua>Vote match settings</aqua>"
    lore:
      - "<gray>Choose chest loot, hearts, time, and weather.</gray>"

votes:
  defaults:
    chests: normal
    hearts: "10"
    time: day
    weather: sunny

game:
  # Set to 0 to disable a time limit
  time_limit_seconds: 0

spawn_protection:
  # Seconds of fall damage immunity after the game starts
  fall_damage_seconds: 5

combat:
  kill_regeneration:
    # Health restored on eliminations (set to 0 to disable)
    health: 6.0

# Game items (optional)
items:
  # Items to give players on game start
  # Format: MATERIAL:AMOUNT:SLOT
  starting_items: []

# Potion effects (optional)
effects:
  # Effects to give players during the game
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  starting_effects:
    - "DAMAGE_RESISTANCE:60:1"

events:
  # Format: "SECONDS_AFTER_START:TYPE:DISPLAY_NAME"
  schedule:
    - "180:CHEST_REFILL:Chest Refill"
    - "300:STORM:Final Storm"

storm:
  enabled: true
  # Final radius (blocks) after the storm finishes shrinking
  final_radius_blocks: 5
  # Time in seconds to shrink from arena bounds to final radius
  shrink_duration_seconds: 120
  # Damage dealt per second while outside the storm border
  damage_per_second: 2.0
  lightning:
    enabled: true
    interval_seconds: 3
    strikes_per_wave: 3

loot:
  refill:
    enabled: true
    interval_seconds: 0
    prefill_on_start: true
    check_interval_ticks: 20
  chests:
    allow_untracked: false
    marker_interval_ticks: 40
    # Per-item weights for loot selection.
    # Format per entry: MATERIAL:AMOUNT:WEIGHT or MATERIAL:MIN_AMOUNT:MAX_AMOUNT:WEIGHT
    # Optional enchantments: append |ENCHANT:LEVEL,ENCHANT:LEVEL (example: DIAMOND_SWORD:1:20|SHARPNESS:2,UNBREAKING:1)
